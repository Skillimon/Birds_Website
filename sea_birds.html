  <main id="main-content" class="container">
    <h2>Seabirds</h2>
    <!-- Bird Table Usability Toolbar -->
    <div class="bird-table-toolbar" aria-label="Bird Table Controls">
      <label for="bird-table-search" class="sr-only">Search birds</label>
      <input type="text" id="bird-table-search" placeholder="Search birds..." autocomplete="off" />

      <label for="bird-table-status" class="sr-only">Status filter</label>
      <select id="bird-table-status">
        <option value="">Status: All</option>
        <option value="LC">LC</option>
        <option value="NT">NT</option>
        <option value="VU">VU</option>
        <option value="EN">EN</option>
        <option value="CR">CR</option>
      </select>

      <label for="bird-table-migration" class="sr-only">Migration filter</label>
      <select id="bird-table-migration">
        <option value="">Migration: All</option>
        <option value="resident">Resident</option>
        <option value="summer">Summer visitor</option>
        <option value="winter">Winter visitor</option>
        <option value="passage">Passage migrant</option>
      </select>

      <button type="button" id="bird-table-clear" class="btn">Clear Filters</button>
      <span id="bird-table-count" class="bird-table-count" aria-live="polite">Birds shown</span>
    </div>

    <div class="gallery-grid">


      <figure class="gallery-item">
        <img src="bird_photos/sea_birds/black-headed-gull.jpg" alt="Black-headed Gull" loading="lazy">
        <figcaption class="figure-caption">
          <span class="common-name">Black-headed Gull</span> 
          <span class="latin-name">Chroicocephalus ridibundus</span>
          <br>Slimbridge<br>2024</figcaption>
